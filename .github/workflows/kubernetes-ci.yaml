---
name: Kubernetes CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint manifests

    strategy:
      fail-fast: false
      matrix:
        kubernetes-version:
          - '1.30'

    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version: '1.22'

      - name: Install kubectl-validate
        run: go install -ldflags='-s -w' -race -trimpath sigs.k8s.io/kubectl-validate@latest

      - name: Lint manifests
        run: |-
          kubectl-validate kubernetes/manifests/ \
            --local-crds kubernetes/crds/ \
            --version '${{ matrix.kubernetes-version }}'
