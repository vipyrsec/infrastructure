---
apiVersion: batch/v1
kind: CronJob

metadata:
  namespace: dragonfly
  name: dragonfly-loader

spec:
  schedule: '* * * * *'
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: dragonfly-loader
              image: ghcr.io/vipyrsec/dragonfly-loader:sha-d39d772488adacc893e496da2ea30fd16452fb8c
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: dragonfly-loader-env
          restartPolicy: Never
